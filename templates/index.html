<!DOCTYPE html>
<html>

<head>

<title>Calculator</title>

<style>

body {
    font-family: Arial;
    text-align: center;
}

input {
    width: 200px;
    height: 40px;
    font-size: 20px;
}

button {
    width: 60px;
    height: 60px;
    font-size: 20px;
    margin: 5px;
}

</style>

</head>

<body>

<h2>Calculator</h2>

<form method="POST">

<input type="number" name="num1" required>

<br><br>

<select name="operation">

<option value="+">+</option>
<option value="-">-</option>
<option value="*">*</option>
<option value="/">/</option>

</select>

<br><br>

<input type="number" name="num2" required>

<br><br>

<button type="submit">Calculate</button>

</form>

<h3>Result: {{ result }}</h3>

</body>

</html>
